<H3>Effect Setting List</H3>

<p class="location">Menu Command: <b>Effect | Select Setting</b></p>


<P>Lists all settings for all effects currently in use by all sections.</P>

<p>Choose a setting, then check the <b>Effect | Setting Graph</b> menu to show the setting within all sections that
use the setting.
